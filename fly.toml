# fly.toml app configuration file generated for roguelearn on 2026-04-26T23:38:16-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'roguelearn'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'

[env]

  DATABASE_URL = 'sqlite:////data/roguelearn.db'
  ENV = 'prod'
  EXTRACTION_MODEL = 'gemini-2.5-flash'
  GRADER_MODEL = 'gemini-2.5-flash'
  LOG_LEVEL = 'INFO'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
